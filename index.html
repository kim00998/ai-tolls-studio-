<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Studio</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
<h1>🚀 AI Tools Studio</h1>
<p>Kumpulan AI terbaik untuk belajar dan bisnis</p>
</header>

<section id="tools">

<div class="card">
<h2>ChatGPT</h2>
<p>AI Chatbot terbaik.</p>
<a href="https://chatgpt.com" target="_blank">
<button>Kunjungi</button>
</a>
</div>

<div class="card">
<h2>Canva AI</h2>
<p>Membuat desain profesional.</p>
<a href="https://www.canva.com" target="_blank">
<button>Kunjungi</button>
</a>
</div>

<div class="card">
<h2>Leonardo AI</h2>
<p>Membuat gambar AI.</p>
<a href="https://leonardo.ai" target="_blank">
<button>Kunjungi</button>
</a>
</div>
<div class="search-box">
    <input
        type="text"
        id="search"
        placeholder="Cari AI Tools..."
        onkeyup="searchTools()">
</div>
</section>

<script src="tools.js"></script>
<script src="script.js"></script>

</body>
</html>
